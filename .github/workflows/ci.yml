name: CI

on:
  push:
    branches: [features]
  pull_request:
    branches: [features]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx next lint

      - name: Format check
        run: npx prettier --check .

      - name: Run tests
        run: npx vitest run --coverage
